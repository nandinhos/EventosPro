# CI/CD Pipeline para EventosPro
# 
# IMPORTANTE: Este workflow é para CI/CD em produção.
# Para desenvolvimento local, use Laravel Sail:
# - sail artisan test
# - sail artisan test --coverage
# - sail bash -c "./run-tests-coverage.sh 80"
# 
# Consulte: docs/LARAVEL_SAIL_COMMANDS.md

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2.29'
        extensions: mbstring, dom, fileinfo, mysql, gd, zip
        coverage: xdebug
    
    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-
    
    - name: Install dependencies
      run: |
        composer install --prefer-dist --no-progress --no-interaction
        composer dump-autoload --optimize
    
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    
    - name: Generate key
      run: php artisan key:generate
    
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    
    - name: Create Database
      run: |
        mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS testing;"
    
    - name: Run migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: testing
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan migrate --force
    
    - name: Run tests with coverage
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: testing
        DB_USERNAME: root
        DB_PASSWORD: password
      run: |
        php artisan test --coverage --min=80 --coverage-html=coverage-report
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report
        path: coverage-report/
    
    - name: Check coverage threshold
      run: |
        echo "Verificando se a cobertura mínima de 80% foi atingida..."
        # O comando anterior já falha se não atingir 80%
        echo "✅ Cobertura mínima atingida!"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2.29'
        extensions: mbstring, dom, fileinfo, mysql
    
    - name: Install dependencies
      run: |
        composer install --prefer-dist --no-progress --no-interaction
        composer dump-autoload --optimize
    
    - name: Run PHP CS Fixer (dry-run)
      run: |
        if [ -f "vendor/bin/php-cs-fixer" ]; then
          vendor/bin/php-cs-fixer fix --dry-run --diff
        else
          echo "PHP CS Fixer não encontrado, pulando verificação de estilo"
        fi
    
    - name: Run PHPStan
      run: |
        if [ -f "vendor/bin/phpstan" ]; then
          vendor/bin/phpstan analyse
        else
          echo "PHPStan não encontrado, pulando análise estática"
        fi