; OPcache configuration for Laravel production optimization
; This file optimizes PHP OPcache for better performance

[opcache]
; Enable OPcache for FPM/webserver (CLI is separate)
opcache.enable=1
opcache.enable_cli=1

; Memory settings - Increased for Laravel application
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000

; Revalidation settings
; For development: validate_timestamps=1 (detects file changes)
; For production: validate_timestamps=0 (maximum performance, requires cache clear on deploy)
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Performance optimizations
opcache.save_comments=1
opcache.max_wasted_percentage=5
opcache.use_cwd=1
opcache.fast_shutdown=1

; Enable file cache for persistence across restarts (optional, commented out)
; opcache.file_cache="/tmp/opcache"
; opcache.file_cache_only=0

; Error handling
opcache.log_verbosity_level=1

; JIT Configuration for PHP 8+
; tracing JIT provides best performance for web applications
opcache.jit_buffer_size=128M
opcache.jit=tracing

; Preload (optional, can be configured in php.ini per environment)
; opcache.preload=/var/www/html/preload.php
; opcache.preload_user=sail
