; OPcache configuration for Laravel production optimization
; This file optimizes PHP OPcache for better performance

[opcache]
; Enable OPcache
opcache.enable=1
opcache.enable_cli=0

; Memory settings
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000

; Revalidation settings
; In production, set opcache.validate_timestamps=0 for maximum performance
; In development, keep=1 to detect file changes
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Performance optimizations
opcache.save_comments=1
opcache.max_wasted_percentage=10
opcache.use_cwd=1
opcache.fast_shutdown=1

; Error handling
opcache.log_verbosity_level=1

; NOTE: JIT disabled due to incompatibility with third-party extensions
; If needed in the future, uncomment and adjust:
; opcache.jit_buffer_size=100M
; opcache.jit=1255
