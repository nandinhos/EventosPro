; EventosPro - PHP-FPM Configuration for VPS Production
; Optimized for: 2 vCPU, 4GB RAM
; Target memory: 512MB-1GB for PHP-FPM pool

[www]

; Process management
; pm = dynamic is best for VPS with limited RAM (vs static)
pm = dynamic

; Maximum number of child processes
; Formula: (Available RAM for PHP-FPM) / (Average PHP process size)
; With 1GB for PHP-FPM and ~50MB per process = 20 max children
pm.max_children = 20

; Number of processes created on startup
pm.start_servers = 4

; Minimum number of idle processes
pm.min_spare_servers = 2

; Maximum number of idle processes
pm.max_spare_servers = 6

; Maximum requests per child before respawn (prevent memory leaks)
pm.max_requests = 500

; Process idle timeout (kill idle processes to save RAM)
pm.process_idle_timeout = 10s

; Status page for monitoring (access via /fpm-status)
pm.status_path = /fpm-status

; Ping page for health checks
ping.path = /fpm-ping
ping.response = pong

; Request timeout (prevent hanging processes)
request_terminate_timeout = 120s

; Slow log for debugging (requests taking >5s)
slowlog = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; PHP environment variables
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

; Security: Clear environment (only pass whitelisted vars)
clear_env = no

; Catch worker output (log to stderr)
catch_workers_output = yes

; Error logging
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php-fpm-error.log

; Memory limits (per process)
php_admin_value[memory_limit] = 256M

; Upload limits
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 25M

; Execution time
php_admin_value[max_execution_time] = 120
php_admin_value[max_input_time] = 60

; Session handling (use Redis in production)
; These will be overridden by .env configuration
php_value[session.save_handler] = redis
php_value[session.save_path] = "tcp://redis:6379"
php_value[session.gc_maxlifetime] = 1440

; Disable dangerous functions for security
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source
