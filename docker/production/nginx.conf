# EventosPro - Nginx Configuration for Production VPS
# Optimized for: 2 vCPU, 4GB RAM
# Memory footprint: ~50-80MB

user nginx;
worker_processes auto;  # Uses all available CPUs (2 vCPUs)
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;  # Sufficient for small-medium traffic
    use epoll;  # Efficient on Linux
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Hide Nginx version (security)

    # Gzip compression (save bandwidth, improve speed)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Client body size (for file uploads)
    client_max_body_size 20M;  # Adjust based on your needs
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # FastCGI cache (optional - uncomment for caching)
    # fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=EVENTOSPRO:100m inactive=60m;
    # fastcgi_cache_key "$scheme$request_method$host$request_uri";

    # Upstream PHP-FPM
    upstream php-fpm {
        server app:9000;  # 'app' is the PHP-FPM container name
        keepalive 5;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;  # Replace with your domain in production

        root /var/www/html/public;
        index index.php index.html;

        charset utf-8;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Logs
        access_log /var/log/nginx/eventospro-access.log;
        error_log /var/log/nginx/eventospro-error.log;

        # Main location
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM handling
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # PHP-FPM optimization
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
            fastcgi_read_timeout 240;

            # Optional: Enable cache (uncomment to use)
            # fastcgi_cache EVENTOSPRO;
            # fastcgi_cache_valid 200 60m;
            # fastcgi_cache_bypass $http_pragma $http_authorization;
        }

        # Static files caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Deny access to sensitive files
        location ~ /\.(?!well-known).* {
            deny all;
        }

        location ~ /\.env {
            deny all;
        }

        location ~ /\.git {
            deny all;
        }

        # Deny access to vendor and node_modules
        location ~ /(vendor|node_modules)/ {
            deny all;
        }

        # Health check endpoint (for Docker)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Optional: HTTPS configuration (uncomment and configure SSL certificates)
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     root /var/www/html/public;
    #     index index.php index.html;
    #
    #     # Same locations as HTTP above...
    # }
}
