; EventosPro - OPcache Configuration for Production VPS
; Optimized for: Laravel 12 on 4GB RAM VPS
; Benefits: 30-50% performance improvement vs no opcache

[opcache]
; Enable OPcache
opcache.enable=1

; Disable for CLI (artisan commands don't need opcache)
opcache.enable_cli=0

; Memory allocation for opcache (256MB is good for Laravel)
opcache.memory_consumption=256

; Interned strings buffer (for class/function names, etc.)
opcache.interned_strings_buffer=16

; Maximum number of files to cache (Laravel has ~10k files)
opcache.max_accelerated_files=10000

; PRODUCTION: Don't check file timestamps (maximum performance)
; Files are only re-cached on PHP-FPM restart
opcache.validate_timestamps=0

; This is ignored when validate_timestamps=0, but keep for reference
opcache.revalidate_freq=0

; Cache files even with comments (needed for Laravel reflection)
opcache.save_comments=1

; Fast shutdown (memory freed by system, not PHP)
opcache.fast_shutdown=1

; Enable file cache for better persistence across restarts (optional)
; opcache.file_cache=/tmp/opcache
; opcache.file_cache_only=0

; JIT (Just-In-Time) Compilation - PHP 8+ feature
; Provides additional 10-20% performance boost for Laravel
opcache.jit_buffer_size=100M
opcache.jit=tracing

; Optimization level (max performance)
opcache.optimization_level=0x7FFEBFFF

; Huge pages support (if available in kernel, improves performance)
opcache.huge_code_pages=1

; Preloading (optional - can improve performance further)
; Uncomment and adjust path if using Laravel preloading
; opcache.preload=/var/www/html/preload.php
; opcache.preload_user=appuser

; Error logging
opcache.error_log=/var/log/opcache-error.log
opcache.log_verbosity_level=1
