# EventosPro - Production Docker Compose Configuration
# Optimized for VPS: 2 vCPU, 4GB RAM, 50GB Disk
# Total estimated usage: 2-3GB RAM, ~2 vCPU

services:
  # ============================================
  # Nginx Web Server
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: eventospro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/production/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - eventospro
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 100M
        reservations:
          cpus: '0.1'
          memory: 50M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # PHP-FPM Application + Queue Worker
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    container_name: eventospro-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - app-logs:/var/log
    environment:
      - CONTAINER_ROLE=app
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventospro
    deploy:
      resources:
        limits:
          cpus: '1.2'
          memory: 1536M
        reservations:
          cpus: '0.8'
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: eventospro-mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/production/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - eventospro
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 1024M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=100
      - --innodb_buffer_pool_size=512M
      - --innodb_log_file_size=128M
      - --query_cache_type=0

  # ============================================
  # Redis Cache/Queue/Sessions
  # ============================================
  redis:
    image: redis:alpine
    container_name: eventospro-redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - eventospro
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --appendonly yes

# ============================================
# Networks
# ============================================
networks:
  eventospro:
    driver: bridge

# ============================================
# Volumes (Persistent Data)
# ============================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  app-logs:
    driver: local
